<style>
@font-face {
  font-family: 'PixelFont';
  src: url('./font/pixelfont.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    border: 0;
    font: inherit;
    vertical-align: baseline;
  }
  body {
    background: black;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  html, body {
    height: 100%;
  }

  canvas {
    display: block;
    margin: 0;
    /* Maintain 16:9 aspect ratio and fit inside the viewport */
    width: calc(min(100vw, 100vh * (16/9)));
    height: auto;
    max-height: 100vh;
  }

  /* Start screen overlay */
  #start-screen {
    position: fixed;
    left: 0;
    top: 0;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0.85) 60%);
    backdrop-filter: blur(2px);
    z-index: 9999;
    opacity: 1;
    transition: opacity 320ms ease;
  }

  #start-screen .panel {
    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border: 2px solid rgba(255,255,255,0.12);
    padding: 28px;
    text-align: center;
    color: #fff;
    max-width: 720px;
    font-family: PixelFont, sans-serif;
    transform: translateY(8px) scale(0.995);
    opacity: 0;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    border-radius: 8px;
    animation: panelIn 600ms cubic-bezier(.2,.9,.3,1) forwards;
  }

  #start-screen h1 {
    margin-bottom: 12px;
    font-size: 28px;
    letter-spacing: 1px;
    transform-origin: center;
    animation: titlePop 560ms cubic-bezier(.2,.9,.3,1) 180ms both;
  }

  #start-screen p { margin-bottom: 18px; }

  #start-button {
    background: #fff;
    color: #000;
    padding: 10px 18px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 4px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.5);
    border: 2px solid rgba(0,0,0,0.05);
    transition: transform 180ms ease, box-shadow 180ms ease;
    will-change: transform;
  }

  #start-button:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 10px 22px rgba(0,0,0,0.6);
  }

  /* Subtle pulsing to draw attention */
  @keyframes pulse {
    0% { box-shadow: 0 6px 18px rgba(0,0,0,0.45); }
    50% { box-shadow: 0 12px 28px rgba(0,0,0,0.55); }
    100% { box-shadow: 0 6px 18px rgba(0,0,0,0.45); }
  }

  #start-button.pulse { animation: pulse 1800ms infinite; }

  @keyframes panelIn {
    from { opacity: 0; transform: translateY(12px) scale(0.992); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes titlePop {
    0% { transform: scale(0.86) translateY(6px); opacity: 0 }
    60% { transform: scale(1.04) translateY(-2px); opacity: 1 }
    100% { transform: scale(1) translateY(0); }
  }

  @keyframes overlayFadeOut {
    from { opacity: 1 }
    to { opacity: 0; pointer-events: none }
  }

  /* When hiding, run a quick reverse animation */
  #start-screen.hide { animation: overlayFadeOut 320ms ease forwards; }
  #start-screen.hide .panel { animation: panelOut 220ms ease forwards; }

  @keyframes panelOut {
    from { opacity: 1; transform: translateY(0) scale(1); }
    to { opacity: 0; transform: translateY(-8px) scale(0.996); }
  }

  /* Resume icon (top-right) */
  #resume-link {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 10001;
    display: inline-block;
  }
  #resume-link img {
    width: 44px;
    height: 44px;
    object-fit: contain;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,0.6));
    cursor: pointer;
    transition: transform 150ms ease, opacity 150ms ease;
    opacity: 0.98;
  }
  #resume-link img:hover { transform: translateY(-3px) scale(1.04); opacity: 1 }

  /* Game over overlay (hidden until triggered) */
  #game-over {
    position: fixed;
    left: 0;
    top: 0;
    width: 100vw;
    height: 100vh;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.72);
    z-index: 10000;
    font-family: PixelFont, sans-serif;
    color: #fff;
  }

  #game-over .panel {
    background: linear-gradient(180deg, rgba(0,0,0,0.4), rgba(0,0,0,0.3));
    border: 2px solid rgba(255,255,255,0.08);
    padding: 28px;
    text-align: center;
    color: #fff;
    max-width: 520px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    border-radius: 8px;
  }

  #game-over h2 { font-size: 28px; margin-bottom: 12px }
  #restart-button {
    background: #fff;
    color: #000;
    padding: 10px 18px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 4px;
    border: 2px solid rgba(0,0,0,0.05);
    margin-top: 8px;
  }
</style>

<script>
  // Start button handler: hide overlay and initialize the game.
  (function() {
    const btn = document.getElementById('start-button')
    const overlay = document.getElementById('start-screen')
    if (!btn || !overlay) return

    const hideOverlayAndStart = () => {
      // run the CSS hide animation, then fully hide after it ends
      overlay.classList.add('hide')
      const onAnimEnd = () => {
        overlay.style.display = 'none'
        overlay.removeEventListener('animationend', onAnimEnd)
      }
      overlay.addEventListener('animationend', onAnimEnd)

      if (typeof window.initGame === 'function') {
        window.initGame()
      } else if (typeof window.startRendering === 'function') {
        window.startRendering()
      }
    }

    btn.addEventListener('click', hideOverlayAndStart)

    // Allow Enter key to start the game for accessibility / convenience
    const onKey = (e) => {
      if (e.code === 'Enter' || e.code === 'NumpadEnter') {
        e.preventDefault()
        hideOverlayAndStart()
      }
    }
    document.addEventListener('keydown', onKey)

    // Focus the start button for immediate keyboard access
    btn.focus()
  })()
</script>
